<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chapter 1 Quiz: Intro to Plotting with ggplot2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f2744;
    --navy-mid: #1a3a5c;
    --navy-light: #2a5298;
    --accent: #00b4d8;
    --green: #22c55e;
    --red: #ef4444;
    --bg: #f0f5fb;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,180,216,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,216,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }
  .header {
    background: var(--navy);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: 'ggplot2';
    position: absolute;
    right: -10px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 72px;
    font-weight: 600;
    color: rgba(255,255,255,0.04);
    white-space: nowrap;
    pointer-events: none;
  }
  .header-label { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .header-title { font-size: 26px; font-weight: 700; color: white; margin-bottom: 6px; }
  .header-sub { font-size: 14px; color: rgba(255,255,255,0.55); }
  .progress-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .score-badge { background: #dcfce7; color: #166534; font-weight: 700; padding: 3px 12px; border-radius: 99px; font-size: 13px; display: none; }
  .progress-bar-bg { background: #dce4ed; border-radius: 99px; height: 6px; margin-bottom: 24px; }
  .progress-bar-fill { background: linear-gradient(90deg, var(--accent), var(--navy-light)); height: 6px; border-radius: 99px; transition: width 0.4s ease; }
  .card { background: var(--card); border-radius: 14px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(15,39,68,0.08); border: 1px solid var(--border); }
  .type-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }
  .type-ts { background: #fff7ed; color: #c2410c; }
  .type-ps { background: #eff6ff; color: #1d4ed8; }
  .type-co { background: #f5f3ff; color: #6d28d9; }
  .question-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.65; margin-bottom: 16px; }
  .code-block { display: block; background: #0f2744; color: #93c5fd; font-family: var(--mono); font-size: 13px; padding: 14px 18px; border-radius: 8px; margin-bottom: 20px; white-space: pre; overflow-x: auto; line-height: 1.7; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; cursor: pointer; transition: all 0.15s; font-size: 14.5px; line-height: 1.5; color: var(--text); font-family: var(--sans); text-align: left; width: 100%; }
  .option:hover:not(.disabled) { border-color: var(--accent); background: #f0fafe; }
  .option.selected:not(.submitted) { border-color: var(--navy-light); background: #eff6ff; }
  .option.correct { border-color: var(--green); background: #f0fdf4; color: #166534; }
  .option.wrong { border-color: var(--red); background: #fef2f2; color: #991b1b; }
  .option.disabled { cursor: default; }
  .opt-letter { min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--mono); background: var(--border); color: var(--muted); flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .option.selected:not(.submitted) .opt-letter { background: var(--navy-light); color: white; }
  .option.correct .opt-letter { background: var(--green); color: white; }
  .option.wrong .opt-letter { background: var(--red); color: white; }
  .opt-check { margin-left: auto; font-size: 18px; flex-shrink: 0; padding-left: 8px; }
  .explanation { margin-top: 18px; background: #f1f5f9; border-left: 4px solid var(--navy-light); border-radius: 0 8px 8px 0; padding: 13px 16px; font-size: 13.5px; color: #334155; line-height: 1.6; animation: fadeIn 0.3s ease; }
  .explanation strong { color: var(--navy-mid); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
  .nav-group { display: flex; gap: 10px; }
  .btn { padding: 10px 22px; border-radius: 9px; border: 2px solid var(--border); background: white; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text); transition: all 0.15s; }
  .btn:hover:not(:disabled) { border-color: var(--navy-mid); background: #f8fafc; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
  .btn-primary:hover:not(:disabled) { background: var(--navy-mid); border-color: var(--navy-mid); }
  .btn-danger { background: var(--red); color: white; border-color: var(--red); }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .dots { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 28px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; background: var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); transition: all 0.15s; font-family: var(--mono); }
  .dot.active { background: var(--navy); color: white; transform: scale(1.15); }
  .dot.answered { background: #93c5fd; color: white; }
  .dot.correct-dot { background: var(--green); color: white; }
  .dot.wrong-dot { background: var(--red); color: white; }
  .results { background: var(--navy); border-radius: 14px; padding: 32px; text-align: center; color: white; margin-top: 24px; animation: fadeIn 0.4s ease; display: none; }
  .results-emoji { font-size: 48px; margin-bottom: 12px; }
  .results-score { font-size: 42px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .results-label { font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 4px; margin-bottom: 16px; }
  .results-msg { font-size: 16px; color: rgba(255,255,255,0.85); max-width: 440px; margin: 0 auto; line-height: 1.6; }
  @media (max-width: 520px) {
    .header { padding: 20px; }
    .header-title { font-size: 20px; }
    .card { padding: 20px; }
    .question-text { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-label">CUAHSI Hydroinformatics &middot; Chapter 1</div>
    <div class="header-title">Intro to Plotting with ggplot2</div>
    <div class="header-sub">25 questions &middot; Problem Solving &amp; Troubleshooting</div>
  </div>
  <div class="progress-row">
    <span id="prog-label">Question 1 of 25</span>
    <span class="score-badge" id="score-badge"></span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:4%"></div>
  </div>
  <div class="card" id="question-card"></div>
  <div class="nav">
    <div class="nav-group">
      <button class="btn" id="btn-prev" onclick="navigate(-1)" disabled>&#8592; Prev</button>
      <button class="btn" id="btn-next" onclick="navigate(1)">Next &#8594;</button>
    </div>
    <div class="nav-group">
      <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()" disabled>Submit Quiz (0/25 answered)</button>
      <button class="btn btn-danger" id="btn-reset" onclick="resetQuiz()" style="display:none">Retake Quiz</button>
    </div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="results" id="results"></div>
</div>

<script>
const Q = [
  {type:"Problem Solving",q:"What does the following line of code do?",code:"library(tidyverse)",opts:["Installs the tidyverse package from CRAN","Loads the tidyverse package into the current R session","Updates the tidyverse package to the latest version","Removes the tidyverse package from your environment"],ans:1,exp:"library() loads an already-installed package into the active session. install.packages() is used to install it — and you only need to do that once."},
  {type:"Problem Solving",q:"Which of the following lines correctly reads a CSV file called 'data.csv' into an R object named MyData?",code:null,opts:["MyData = read.csv(data.csv)",'MyData <- read_csv("data.csv")',"read_csv(\"data.csv\") -> \"MyData\"",'MyData <- load_csv("data.csv")'],ans:1,exp:"read_csv() from tidyverse/readr is correct. The filename must be in quotes, and <- is the standard R assignment operator."},
  {type:"Problem Solving",q:"What is the purpose of the aes() function inside a ggplot() call?",code:null,opts:["It sets the visual theme (colors, fonts) of the entire plot","It maps columns in your data to visual properties like x, y, color, and size","It adds a new geometry layer such as points or lines","It saves the completed plot to a file"],ans:1,exp:"aes() stands for 'aesthetics'. It tells ggplot which data columns to use for x/y position, color, size, shape, and so on."},
  {type:"Problem Solving",q:"Which line of code produces a line plot of the Pine dataset with datetime on the x-axis and cfs on the y-axis?",code:null,opts:["ggplot(Pine, aes(x = cfs, y = datetime)) + geom_line()","ggplot(data = Pine, aes(x = datetime, y = cfs)) + geom_line()","ggplot(data = Pine) + geom_line(x = datetime, y = cfs)",'plot(Pine$datetime, Pine$cfs, type = "l")'],ans:1,exp:"The data argument, aes() with x and y correctly assigned, and geom_line() are all required. Option D is base R, not ggplot2."},
  {type:"Problem Solving",q:"What does geom_point(pch = 8) do in a ggplot?",code:null,opts:["Makes each point 8 times larger than the default","Sets the point color to the 8th entry in the current palette","Changes the point shape to the symbol for pch value 8 (an asterisk *)","Adds 8 randomly placed points to the plot"],ans:2,exp:"pch controls point shape. pch = 8 produces an asterisk (*). R has a reference chart of pch values 0-25 mapping to different symbols."},
  {type:"Problem Solving",q:"Which line adds a log base-10 scale to the y-axis in ggplot2?",code:null,opts:['geom_log10(axis = "y")',"ylab(log10)","scale_y_log10()","aes(y = log(cfs, base = 10))"],ans:2,exp:"scale_y_log10() is the correct ggplot2 function. It transforms the y-axis display without modifying the underlying data values."},
  {type:"Problem Solving",q:"What does the following code accomplish?",code:"ggplot(data = SNP, aes(x = datetime, y = cfs, color = StationID)) +\n  geom_line()",opts:["Produces two separate side-by-side plots, one per station","Plots all records as a single line, colored by discharge value","Draws a separate colored line for each unique StationID on the same axes, with an automatic legend","Colors the line based on the datetime values"],ans:2,exp:"Mapping color = StationID inside aes() tells ggplot to group and color lines by that column — one line per station — and generates a legend automatically."},
  {type:"Problem Solving",q:'What does nrow = 2 do in the following call?\n\nfacet_wrap(facets = "StationID", nrow = 2)',code:null,opts:["Limits the dataset to show only the first 2 rows of data","Arranges the facet panels into 2 rows, stacked vertically","Creates 2 columns of panels","Sets the plot height to 2 inches"],ans:1,exp:"nrow in facet_wrap() controls panel layout. nrow = 2 stacks the panels vertically, which is useful for comparing time-series across groups."},
  {type:"Problem Solving",q:'What does facet_grid(StationID ~ month, scales = "free") produce?',code:null,opts:["A single plot filtered to one station and one month","A grid of panels organized by StationID (rows) and month (columns), with each panel having its own axis scale","A grid of panels organized by both variables, all sharing the same axis scales","A gridline overlay drawn on top of the existing plot"],ans:1,exp:'facet_grid() uses two variables to build a matrix of panels. scales = "free" lets each panel independently determine its axis ranges.'},
  {type:"Problem Solving",q:"What visual effect does setting alpha = 0.3 inside geom_point() produce?",code:null,opts:["Points are colored a shade of gray","Points are 30% larger than the default","Points are 70% transparent, revealing density where points overlap","Only 30% of the dataset's points are plotted"],ans:2,exp:"alpha controls opacity on a 0 (invisible) to 1 (fully opaque) scale. alpha = 0.3 makes points mostly transparent — useful when many points overlap."},
  {type:"Problem Solving",q:"Which combination of geoms is used in the final multi-layer plot of the lesson to show both a regression line and raw data points?",code:null,opts:["geom_line() + geom_bar()",'stat_smooth(method = "lm", linetype = 2) + geom_point()',"geom_smooth() + geom_line()","geom_abline() + geom_point()"],ans:1,exp:'stat_smooth(method = "lm") draws a linear model fit; linetype = 2 makes it dashed. geom_point() overlays the raw data. Both layers are added with + to the same ggplot call.'},
  {type:"Troubleshooting",q:"A student writes the line below. What is wrong with it?",code:'Pine < - read_csv("PINE_Jan-Mar_2010.csv")',opts:["The function should be read.csv(), not read_csv()","There is a space inside the assignment operator — it should be <- not < -","Hyphens are not allowed in CSV file names","Pine must be declared as a variable before it is assigned"],ans:1,exp:"The assignment operator <- must have no space between < and -. Written as < -, R treats it as a less-than comparison, not assignment, causing an error."},
  {type:"Troubleshooting",q:"Which of the following ggplot calls contains a syntax error?",code:null,opts:["ggplot(data = Pine, aes(x = datetime, y = cfs)) + geom_line()","ggplot(data = Pine, aes(x = datetime, y = cfs)) + geom_point(pch = 8)","ggplot(data = Pine, aes(x = datetime, y = cfs)) geom_line()",'ggplot(data = Pine, aes(x = datetime, y = cfs)) + geom_point(color = "blue")'],ans:2,exp:"In ggplot2, layers must be joined with +. Option C is missing the + between ggplot() and geom_line(), so R sees two unrelated expressions and throws an error."},
  {type:"Troubleshooting",q:"A student wants blue points but writes the code below. What actually happens?",code:'ggplot(data = Pine, aes(x = datetime, y = cfs, color = "blue")) + geom_point()',opts:["The points are colored blue as intended","An error is thrown because color cannot be used inside aes()","The points are a default ggplot2 color and a legend is created with the label 'blue'","The code runs but no color is applied at all"],ans:2,exp:"Placing color = \"blue\" inside aes() tells ggplot to treat the string 'blue' as a data variable, creating a legend labeled 'blue'. The actual color is chosen by ggplot's default palette. Move color = \"blue\" to geom_point() to get blue points."},
  {type:"Troubleshooting",q:"Which of the following facet_wrap() calls does NOT contain an error?",code:null,opts:["facet_wrap(facets = StationID, nrow = 2)",'facet_wrap(facets = "StationID", nrow = 2)','facet_wrap("StationID", rows = 2)','facet_wrap(cols = "StationID", nrow = 2)'],ans:1,exp:"The variable name must be a quoted string with the facets = argument. Option A lacks quotes; C uses the wrong argument name (rows vs nrow); D uses cols = which belongs to facet_grid(), not facet_wrap()."},
  {type:"Troubleshooting",q:"Which of the following attempts to add a boxplot will cause an error in ggplot2?",code:null,opts:["ggplot(data = SNP, aes(x = StationID, y = cfs)) + stat_boxplot() + scale_y_log10()","ggplot(data = SNP, aes(x = StationID, y = cfs)) + geom_boxplot()","ggplot(data = SNP, aes(x = StationID, y = cfs)) + stat_boxplot()","ggplot(data = SNP, aes(x = StationID, y = cfs)) + boxplot()"],ans:3,exp:"boxplot() is a base R function and cannot be added as a ggplot2 layer with +. Use geom_boxplot() or stat_boxplot() instead."},
  {type:"Troubleshooting",q:"A student expects a scatter plot of RBI vs DRAIN_SQKM colored by AGGECOREGION but writes the code below. What is the problem?",code:"ggplot(RBI, aes(RBI, DRAIN_SQKM, color = AGGECOREGION)) + geom_line()",opts:["color cannot be used as an aesthetic in this context","The function name should be ggplot2(), not ggplot()","geom_line() draws connected lines — the student should use geom_point() to get a scatter plot","The x and y variables are in the wrong order"],ans:2,exp:"The code is syntactically valid but produces a line plot, not a scatter plot. geom_line() connects points in data order. Replace it with geom_point() to get individual dots."},
  {type:"Troubleshooting",q:"A student wants point size mapped to T_AVG_SITE and background color to STATE. Which line is correct?",code:null,opts:["ggplot(RBI, aes(RBI, DRAIN_SQKM)) + geom_point(pch = 21, size = T_AVG_SITE, bg = STATE)","ggplot(RBI, aes(RBI, DRAIN_SQKM, size = T_AVG_SITE, bg = STATE)) + geom_point(pch = 21, alpha = 0.3)","ggplot(RBI, aes(RBI, DRAIN_SQKM)) + geom_point(pch = 21, aes(size = T_AVG_SITE, bg = STATE), alpha = 0.3)","Both B and C are valid"],ans:3,exp:"Data-mapped aesthetics must be inside aes(). This can go in the global aes() (option B) or inside geom_point(aes()) (option C) — both work. Option A is wrong because size = T_AVG_SITE outside aes() would be treated as a constant."},
  {type:"Concept",q:'How many times do you need to run install.packages("tidyverse") on a given computer?',code:null,opts:["Every time you open a new R session","Once per script file","Only once — the package is saved to your machine after installation","Once per day when R updates"],ans:2,exp:"install.packages() downloads the package permanently. After that, you only need library(tidyverse) at the top of each new session's script."},
  {type:"Concept",q:"Why is scale_y_log10() useful when making a boxplot of streamflow data from two different watersheds?",code:null,opts:["It converts the y-axis to show percentages","Streamflow data often spans several orders of magnitude, and a log scale makes differences between groups visible","It reverses the y-axis direction","It limits the y-axis to values between 0 and 10"],ans:1,exp:"When values range from, say, 1 to 10,000 cfs, a linear scale squashes smaller values. A log scale distributes data more evenly, making group comparisons much clearer."},
  {type:"Concept",q:"What is the key practical difference between facet_wrap() and facet_grid() in ggplot2?",code:null,opts:["facet_wrap() wraps panels from a single variable into a flexible layout; facet_grid() uses two variables to build a row-by-column matrix of panels","facet_wrap() is for line plots only; facet_grid() works with any geom","facet_grid() requires an extra package beyond tidyverse","There is no meaningful difference — they produce identical output"],ans:0,exp:"facet_wrap() handles one faceting variable and arranges panels in a ribbon. facet_grid() takes two variables (rows ~ cols) and creates a structured matrix — ideal for exploring interactions between two grouping variables."}
];

let cur = 0, ans = {}, submitted = false;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function typeCls(t){ return t==="Troubleshooting"?"type-ts":t==="Problem Solving"?"type-ps":"type-co"; }

function render(){
  const q = Q[cur];
  const sel = ans[cur];
  const codeHTML = q.code ? `<code class="code-block">${esc(q.code)}</code>` : '';
  const optsHTML = q.opts.map((o,i)=>{
    let cls='option', chk='';
    if(submitted){
      cls+=' disabled submitted';
      if(i===q.ans){cls+=' correct';chk='<span class="opt-check">&#10003;</span>';}
      else if(sel===i){cls+=' wrong';chk='<span class="opt-check">&#10007;</span>';}
    } else {
      if(sel===i) cls+=' selected';
    }
    return `<button class="${cls}" onclick="pick(${i})"><span class="opt-letter">${'ABCD'[i]}</span><span>${esc(o)}</span>${chk}</button>`;
  }).join('');
  const expHTML = submitted ? `<div class="explanation"><strong>Explanation:</strong> ${esc(q.exp)}</div>` : '';

  document.getElementById('question-card').innerHTML =
    `<span class="type-badge ${typeCls(q.type)}">${q.type}</span>
     <div class="question-text">${esc(q.q)}</div>
     ${codeHTML}
     <div class="options">${optsHTML}</div>
     ${expHTML}`;

  const pct = ((cur+1)/Q.length*100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `Question ${cur+1} of ${Q.length}`;
  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = cur===Q.length-1;
  const count = Object.keys(ans).length;
  const sub = document.getElementById('btn-submit');
  sub.textContent = `Submit Quiz (${count}/${Q.length} answered)`;
  sub.disabled = count < Q.length;
  renderDots();
}

function pick(i){
  if(submitted) return;
  ans[cur]=i;
  render();
}

function navigate(d){ cur = Math.max(0,Math.min(Q.length-1,cur+d)); render(); }

function renderDots(){
  document.getElementById('dots').innerHTML = Q.map((_,i)=>{
    let cls='dot';
    if(i===cur) cls+=' active';
    else if(submitted && ans[i]===Q[i].ans) cls+=' correct-dot';
    else if(submitted && ans[i]!==undefined) cls+=' wrong-dot';
    else if(ans[i]!==undefined) cls+=' answered';
    return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
}

function goTo(i){ cur=i; render(); }

function submitQuiz(){
  submitted=true;
  const score = Q.reduce((a,q,i)=>a+(ans[i]===q.ans?1:0),0);
  document.getElementById('btn-submit').style.display='none';
  document.getElementById('btn-reset').style.display='';
  const badge = document.getElementById('score-badge');
  badge.textContent=`Score: ${score}/${Q.length} (${Math.round(score/Q.length*100)}%)`;
  badge.style.display='';
  const emoji = score>=22?'&#127881;':score>=17?'&#128077;':'&#128218;';
  const msg = score>=22?'Excellent! You have a strong grasp of ggplot2 fundamentals.':score>=17?'Good job! Review the explanations for questions you missed.':'Keep at it — revisit the plotting demo and try again after reviewing the material.';
  const res = document.getElementById('results');
  res.style.display='block';
  res.innerHTML=`<div class="results-emoji">${emoji}</div><div class="results-score">${score} / ${Q.length}</div><div class="results-label">${Math.round(score/Q.length*100)}% correct</div><div class="results-msg">${msg}</div>`;
  render();
}

function resetQuiz(){
  ans={}; submitted=false; cur=0;
  document.getElementById('btn-submit').style.display='';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('score-badge').style.display='none';
  document.getElementById('results').style.display='none';
  render();
}

render();
</script>
</body>
</html>

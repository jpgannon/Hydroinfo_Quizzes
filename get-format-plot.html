<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chapter 6 Quiz: Joins, Pivots, and USGS dataRetrieval</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy: #0f2744;
    --navy-mid: #1a3a5c;
    --navy-light: #2a5298;
    --accent: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --bg: #f0f5fb;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 16px 64px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrap { max-width: 780px; margin: 0 auto; position: relative; z-index: 1; }
  .header {
    background: var(--navy);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: 'joins';
    position: absolute;
    right: -10px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--mono);
    font-size: 80px;
    font-weight: 600;
    color: rgba(255,255,255,0.04);
    white-space: nowrap;
    pointer-events: none;
  }
  .header-label { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .header-title { font-size: 24px; font-weight: 700; color: white; margin-bottom: 6px; }
  .header-sub { font-size: 14px; color: rgba(255,255,255,0.55); }
  .progress-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .score-badge { background: #dcfce7; color: #166534; font-weight: 700; padding: 3px 12px; border-radius: 99px; font-size: 13px; display: none; }
  .progress-bar-bg { background: #dce4ed; border-radius: 99px; height: 6px; margin-bottom: 24px; }
  .progress-bar-fill { background: linear-gradient(90deg, var(--accent), var(--navy-light)); height: 6px; border-radius: 99px; transition: width 0.4s ease; }
  .card { background: var(--card); border-radius: 14px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(15,39,68,0.08); border: 1px solid var(--border); }
  .type-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; margin-bottom: 16px; }
  .type-ts { background: #fff7ed; color: #c2410c; }
  .type-ps { background: #eff6ff; color: #1d4ed8; }
  .type-co { background: #f5f3ff; color: #6d28d9; }
  .question-text { font-size: 16px; font-weight: 600; color: var(--text); line-height: 1.65; margin-bottom: 16px; }
  .code-block { display: block; background: #0f2744; color: #c4b5fd; font-family: var(--mono); font-size: 13px; padding: 14px 18px; border-radius: 8px; margin-bottom: 20px; white-space: pre; overflow-x: auto; line-height: 1.7; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border-radius: 10px; border: 2px solid var(--border); background: #f8fafc; cursor: pointer; transition: all 0.15s; font-size: 14.5px; line-height: 1.5; color: var(--text); font-family: var(--sans); text-align: left; width: 100%; }
  .option:hover:not(.disabled) { border-color: var(--accent); background: #f5f3ff; }
  .option.selected:not(.submitted) { border-color: var(--navy-light); background: #eff6ff; }
  .option.correct { border-color: var(--green); background: #f0fdf4; color: #166534; }
  .option.wrong { border-color: var(--red); background: #fef2f2; color: #991b1b; }
  .option.disabled { cursor: default; }
  .opt-letter { min-width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: var(--mono); background: var(--border); color: var(--muted); flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .option.selected:not(.submitted) .opt-letter { background: var(--navy-light); color: white; }
  .option.correct .opt-letter { background: var(--green); color: white; }
  .option.wrong .opt-letter { background: var(--red); color: white; }
  .opt-check { margin-left: auto; font-size: 18px; flex-shrink: 0; padding-left: 8px; }
  .explanation { margin-top: 18px; background: #f1f5f9; border-left: 4px solid var(--accent); border-radius: 0 8px 8px 0; padding: 13px 16px; font-size: 13.5px; color: #334155; line-height: 1.6; animation: fadeIn 0.3s ease; }
  .explanation strong { color: var(--navy-mid); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .nav { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
  .nav-group { display: flex; gap: 10px; }
  .btn { padding: 10px 22px; border-radius: 9px; border: 2px solid var(--border); background: white; cursor: pointer; font-family: var(--sans); font-size: 14px; font-weight: 600; color: var(--text); transition: all 0.15s; }
  .btn:hover:not(:disabled) { border-color: var(--navy-mid); background: #f8fafc; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--navy); color: white; border-color: var(--navy); }
  .btn-primary:hover:not(:disabled) { background: var(--navy-mid); border-color: var(--navy-mid); }
  .btn-danger { background: var(--red); color: white; border-color: var(--red); }
  .btn-danger:hover:not(:disabled) { background: #dc2626; }
  .dots { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 28px; }
  .dot { width: 28px; height: 28px; border-radius: 50%; background: var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--muted); transition: all 0.15s; font-family: var(--mono); }
  .dot.active { background: var(--navy); color: white; transform: scale(1.15); }
  .dot.answered { background: #a5b4fc; color: #312e81; }
  .dot.correct-dot { background: var(--green); color: white; }
  .dot.wrong-dot { background: var(--red); color: white; }
  .results { background: var(--navy); border-radius: 14px; padding: 32px; text-align: center; color: white; margin-top: 24px; animation: fadeIn 0.4s ease; display: none; }
  .results-emoji { font-size: 48px; margin-bottom: 12px; }
  .results-score { font-size: 42px; font-weight: 700; font-family: var(--mono); color: var(--accent); }
  .results-label { font-size: 15px; color: rgba(255,255,255,0.6); margin-top: 4px; margin-bottom: 16px; }
  .results-msg { font-size: 16px; color: rgba(255,255,255,0.85); max-width: 440px; margin: 0 auto; line-height: 1.6; }
  @media (max-width: 520px) {
    .header { padding: 20px; }
    .header-title { font-size: 18px; }
    .card { padding: 20px; }
    .question-text { font-size: 15px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-label">Hydroinformatics &middot; Chapter 6</div>
    <div class="header-title">Joins, Pivots, and USGS dataRetrieval</div>
    <div class="header-sub">multiple-choice questions &middot; Problem Solving &amp; Troubleshooting</div>
  </div>
  <div class="progress-row">
    <span id="prog-label">Question 1 of 25</span>
    <span class="score-badge" id="score-badge"></span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill" style="width:4%"></div>
  </div>
  <div class="card" id="question-card"></div>
  <div class="nav">
    <div class="nav-group">
      <button class="btn" id="btn-prev" onclick="navigate(-1)" disabled>&#8592; Prev</button>
      <button class="btn" id="btn-next" onclick="navigate(1)">Next &#8594;</button>
    </div>
    <div class="nav-group">
      <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()" disabled>Submit Quiz (0/25 answered)</button>
      <button class="btn btn-danger" id="btn-reset" onclick="resetQuiz()" style="display:none">Retake Quiz</button>
    </div>
  </div>
  <div class="dots" id="dots"></div>
  <div class="results" id="results"></div>
</div>

<script>
const Q = [

  // ── dataRetrieval / USGS ────────────────────────────────────────────────────

  {type:"Problem Solving",
   q:"What is the main advantage of using the dataRetrieval package over manually downloading data from waterdata.usgs.gov?",
   code:null,
   opts:["It provides higher-quality data than the USGS website",
         "It allows you to access the same public USGS data programmatically, making analyses more reproducible and faster without clicking through a website",
         "It automatically cleans and fills in missing values",
         "It is the only way to access data from USGS gages built after 2010"],
   ans:1,
   exp:"The dataRetrieval package connects to the same USGS NWIS data available on the website, but lets you download and work with it entirely in R code. This makes workflows reproducible and much faster when working with many sites or time periods."},

  {type:"Problem Solving",
   q:"When passing a USGS site number to dataRetrieval functions, what format must it be in?",
   code:null,
   opts:["A numeric value, e.g. 3171000",
         'A character string with the agency prefix, e.g. "USGS-03171000"',
         'A character string without any prefix, e.g. "03171000"',
         "An integer with exactly 8 digits"],
   ans:1,
   exp:"dataRetrieval requires site numbers to be character strings (in quotes) and include the agency code prefix 'USGS-'. Passing them as plain numbers or without the prefix will not work."},

  {type:"Problem Solving",
   q:"Which dataRetrieval function is used to download daily values (e.g. daily mean discharge) for a set of sites?",
   code:null,
   opts:["read_waterdata_ts_meta()",
         "read_waterdata_monitoring_location()",
         "read_waterdata_daily()",
         "readWQPqw()"],
   ans:2,
   exp:"read_waterdata_daily() downloads daily time series values for specified sites, parameters, and date ranges. read_waterdata_ts_meta() returns metadata about what data are available, and readWQPqw() is for water quality grab samples."},

  {type:"Problem Solving",
   q:"What does the following argument do inside read_waterdata_daily()?",
   code:'time = c("2006-10-01", "2008-09-30")',
   opts:["Sets the time zone for the downloaded data",
         "Specifies the start and end dates of the data to download in YYYY-MM-DD format",
         "Creates a column called 'time' in the downloaded tibble",
         "Limits the download to data collected at exactly those two dates"],
   ans:1,
   exp:"The time argument takes a two-element character vector specifying the start and end of the desired date range. Dates must be formatted as YYYY-MM-DD strings."},

  {type:"Problem Solving",
   q:"In the lesson, why is a left_join() performed immediately after read_waterdata_daily() using parameterCdFile?",
   code:null,
   opts:["To filter the data to only discharge measurements",
         "To add human-readable parameter names (like 'Discharge') to the downloaded data, which only contains numeric parameter codes like '00060'",
         "To convert the data from wide to long format",
         "To remove duplicate rows from the downloaded data"],
   ans:1,
   exp:"The raw downloaded data identifies measurements only by numeric parameter codes (e.g. '00060'). Joining with parameterCdFile — a lookup table bundled with dataRetrieval — adds the human-readable parameter names, making the data much easier to interpret."},

  {type:"Problem Solving",
   q:"What does str_detect(monitoring_location_id, \"USGS-\") do in the filter() call used in the lesson?",
   code:null,
   opts:["Sorts the data so USGS sites appear first",
         "Keeps only rows where the monitoring_location_id column contains the string 'USGS-', filtering out non-USGS entries",
         "Converts all site IDs to uppercase",
         "Checks whether the site is currently active"],
   ans:1,
   exp:"str_detect() from the stringr package returns TRUE if a string contains the specified pattern. Wrapping it in filter() keeps only the rows where the site ID includes 'USGS-', removing any non-USGS monitoring locations that might have appeared in the bounding box query."},

  // ── JOINS ───────────────────────────────────────────────────────────────────

  {type:"Concept",
   q:"What is the fundamental purpose of a join operation in data analysis?",
   code:null,
   opts:["To sort two datasets by a common column",
         "To combine rows from two datasets by matching them on a shared key column",
         "To remove duplicate rows from a single dataset",
         "To stack two datasets with identical columns on top of each other"],
   ans:1,
   exp:"A join matches rows from two different tables based on a shared key column (like a site ID or date) and combines the data from both into a single table. This is essential when related information is stored in separate datasets."},

  {type:"Concept",
   q:"You have discharge data for 500 dates and chemistry grab samples for 30 of those dates. You want to keep all 500 discharge records and attach chemistry where it exists. Which join should you use?",
   code:null,
   opts:["inner_join() — to keep only dates that appear in both datasets",
         "left_join() — to keep all discharge records and attach matching chemistry, leaving NA where there is no chemistry",
         "right_join() — to keep only the 30 chemistry records",
         "full_join() — to keep all records from both datasets"],
   ans:1,
   exp:"left_join() preserves every row from the left (discharge) dataset and attaches matching rows from the right (chemistry) dataset. Dates with no chemistry get NA values. This is exactly the use case described in the lesson."},

  {type:"Concept",
   q:"Two datasets share a key — River1 and River2 are in both, River3 is only in the left dataset, and River5 is only in the right. What does inner_join() return?",
   code:null,
   opts:["All four rivers, with NAs for missing values",
         "Only the rows for River1 and River2, where both datasets have a match",
         "River1, River2, and River3 (all left-side rows)",
         "River1, River2, and River5 (all right-side rows)"],
   ans:1,
   exp:"inner_join() keeps only rows where the key exists in BOTH datasets. River3 (left only) and River5 (right only) are dropped. Only the two matching rows — River1 and River2 — are returned."},

  {type:"Concept",
   q:"What does full_join() do when a key value exists in one dataset but not the other?",
   code:null,
   opts:["It drops the unmatched row from both datasets",
         "It keeps only the row from the larger dataset",
         "It keeps all rows from both datasets and fills in NA where there is no matching value",
         "It throws an error if any key is unmatched"],
   ans:2,
   exp:"full_join() is the most inclusive join — it keeps every row from both datasets. Where a key has no match on one side, R fills in NA for the missing columns. The lesson describes it as 'the hoarder of the joins'."},

  {type:"Problem Solving",
   q:"The key column is named 'monitoring_location_id' in the left tibble but 'location_id' in the right tibble. Which join syntax is correct?",
   code:null,
   opts:['left_join(left_tbl, right_tbl, by = "monitoring_location_id")',
         'left_join(left_tbl, right_tbl, by = c("monitoring_location_id" = "location_id"))',
         'left_join(left_tbl, right_tbl, by = monitoring_location_id == location_id)',
         'left_join(left_tbl, right_tbl, key = c("monitoring_location_id", "location_id"))'],
   ans:1,
   exp:"When the key column has different names in each dataset, you use by = c(\"left_name\" = \"right_name\"). The column name on the left side of = is from the left tibble; the right side is from the right tibble. Both must be quoted."},

  {type:"Problem Solving",
   q:"After performing a left_join() in the lesson, the result had 61 columns. What did the student do next to make it more manageable?",
   code:null,
   opts:["Used filter() to remove unwanted rows",
         "Used select() to keep only the 7 most relevant columns",
         "Used mutate() to combine several columns into one",
         "Used pivot_wider() to reorganize the columns"],
   ans:1,
   exp:"After the join produced a wide 61-column tibble, the lesson used select() to keep only the essential columns: monitoring_location_id, monitoring_location_name, parameter_code, parameter_name, parameter_description, begin, and end."},

  {type:"Troubleshooting",
   q:"A student writes the join below but gets an error. What is wrong?",
   code:"left_join(dataAvailable, siteinfo, by = monitoring_location_id)",
   opts:["left_join() requires three arguments, but only two tibbles were provided",
         "The by argument must be a quoted string or character vector — monitoring_location_id is missing quotes",
         "left_join() cannot be used when both tibbles have the same column name",
         "dataAvailable must come after siteinfo in a left_join()"],
   ans:1,
   exp:"The by argument requires the column name(s) as a quoted character string or vector. Without quotes, R tries to evaluate monitoring_location_id as an object and fails. The correct syntax is by = \"monitoring_location_id\"."},

  {type:"Troubleshooting",
   q:"A student wants to keep only rows where a key exists in BOTH datasets but writes a full_join() instead of inner_join(). What is the actual result?",
   code:null,
   opts:["The result is identical because full_join() and inner_join() behave the same when keys match",
         "The result contains all rows from both datasets, including unmatched rows filled with NA — more rows than the student wanted",
         "The result contains only rows from the right dataset",
         "R throws an error because full_join() requires the datasets to have the same number of rows"],
   ans:1,
   exp:"full_join() keeps everything from both datasets, adding NAs for unmatched rows. If the student wanted only matched rows, they needed inner_join(). Using full_join() by mistake will inflate the dataset with extra NA-filled rows."},

  // ── PIVOTING ────────────────────────────────────────────────────────────────

  {type:"Concept",
   q:"In LONG format data, how are multiple measurements (e.g. temperature and discharge) typically stored?",
   code:null,
   opts:["Each variable has its own column, so there is one row per date",
         "Each observation has its own row, with a column that identifies the variable type and another that holds the value",
         "All values are stored in a single comma-separated string per row",
         "Variables are stored as column names only, with no value column"],
   ans:1,
   exp:"In long format, there is one row per individual observation. A 'name' or 'variable' column identifies what was measured (e.g. discharge vs. temperature), and a 'value' column holds the actual number. This is the format returned by read_waterdata_daily()."},

  {type:"Concept",
   q:"Why is LONG data format generally better for plotting multiple groups with ggplot2?",
   code:null,
   opts:["ggplot2 requires long data and will throw an error on wide data",
         "In long format, a grouping variable like site or parameter can be mapped to color or facets with a single aes() argument, rather than requiring a separate geom for each column",
         "Long data takes up less memory, making ggplot2 faster",
         "Wide data cannot be used with geom_line()"],
   ans:1,
   exp:"When data is long, a categorical column (like StationID or parameter_nm) can be passed to color = or facets = in a single call. With wide data, each variable lives in its own column, so you would need to write a separate geom layer for every variable — which scales very poorly."},

  {type:"Concept",
   q:"Why is WIDE data format generally better for computing new variables with mutate()?",
   code:null,
   opts:["mutate() only works on wide data",
         "In wide format, each variable is a column, so arithmetic between variables is as simple as referencing column names in a formula",
         "Wide data automatically removes NAs before a mutate() call",
         "Wide format is required when using the pipe operator |>"],
   ans:1,
   exp:"When related variables are in separate columns, you can compute new values with simple column arithmetic inside mutate(). For example, mutate(NO3_Load = NO3 * Flow). In long format, the values are stacked in one column and you cannot directly subtract one from another without pivoting first."},

  {type:"Problem Solving",
   q:"What does pivot_wider() do to a dataset?",
   code:null,
   opts:["Adds more rows by duplicating existing ones",
         "Takes values from a column that identifies variable names and spreads them into separate columns, creating a wider table with fewer rows",
         "Converts all numeric columns to character type",
         "Removes rows that contain NA values"],
   ans:1,
   exp:"pivot_wider() takes a 'names' column (whose unique values become new column names) and a 'values' column (whose contents fill those columns), turning a long dataset into a wide one. The result has more columns but fewer rows."},

  {type:"Problem Solving",
   q:"What does pivot_longer() do to a dataset?",
   code:null,
   opts:["Reduces the number of columns by merging them into a key-value pair, increasing the number of rows",
         "Sorts rows by the length of their values",
         "Increases the number of columns by spreading a key column",
         "Filters out rows where values are longer than a threshold"],
   ans:0,
   exp:"pivot_longer() takes multiple columns and collapses them into two columns: one for the former column name (a 'name' variable) and one for the value. The result has fewer columns but more rows — the opposite of pivot_wider()."},

  {type:"Problem Solving",
   q:"In the lesson, why did the student use pivot_wider() before computing the flow difference between Radford and Ivanhoe?",
   code:null,
   opts:["Because pivot_wider() automatically calculates differences between columns",
         "Because in the original long format both sites' discharge values were stacked in the same column, making direct subtraction impossible — pivoting gave each site its own column",
         "Because ggplot2 requires wide data to plot a line chart",
         "Because filter() only works on wide-format data"],
   ans:1,
   exp:"In long format, discharge values for all sites share one 'value' column. You cannot subtract Radford's value from Ivanhoe's value in that form. pivot_wider() gives each site its own column, after which a simple mutate() subtraction is possible."},

  {type:"Problem Solving",
   q:"What does the following pivot_wider() call do?",
   code:"pivot_wider(names_from = monitoring_location_name,\n            values_from = value)",
   opts:["Creates a new column called 'monitoring_location_name' filled with 'value'",
         "Turns each unique site name into its own column, filling those columns with the corresponding values from the 'value' column",
         "Filters the data to only the rows where monitoring_location_name matches value",
         "Renames the 'value' column to 'monitoring_location_name'"],
   ans:1,
   exp:"names_from tells pivot_wider() which column's unique entries should become new column headers. values_from tells it which column's data should fill those new columns. The result is one column per unique site name, filled with that site's values."},

  {type:"Problem Solving",
   q:"In the water quality example, what does the following pivot_longer() call specify?",
   code:"pivot_longer(cols = Spec_Cond:Chloride)",
   opts:["Subtracts Chloride from Spec_Cond and stores the result",
         "Pivots all columns between Spec_Cond and Chloride (inclusive) from wide to long, stacking their values into a single 'value' column with a 'name' column identifying each",
         "Keeps only the Spec_Cond and Chloride columns and drops everything else",
         "Renames Spec_Cond to Chloride"],
   ans:1,
   exp:"pivot_longer(cols = Spec_Cond:Chloride) selects all columns from Spec_Cond through Chloride using the colon range syntax. Those columns are collapsed into a 'name' column (containing 'Spec_Cond' or 'Chloride') and a 'value' column holding each measurement."},

  {type:"Troubleshooting",
   q:"A student runs the code below hoping to pivot discharge data wider, but the result still has only one column of values. What is the likely mistake?",
   code:"pivot_wider(names_from = value,\n            values_from = monitoring_location_name)",
   opts:["pivot_wider() requires a group_by() call first",
         "The names_from and values_from arguments are swapped — names_from should point to the column with site names, and values_from should point to the column with the measurements",
         "pivot_wider() cannot be used with monitoring location data",
         "The pipe |> is missing before pivot_wider()"],
   ans:1,
   exp:"names_from should identify the column whose unique values become new column names (the categorical variable — here, the site name), and values_from should identify the column whose data fills those new columns (the measurement — here, the numeric values). Swapping them produces nonsensical or broken output."},

  {type:"Troubleshooting",
   q:"After using pivot_wider(), a student tries to reference a new column called 'NEW RIVER AT RADFORD, VA' in mutate() without backticks. What happens?",
   code:"mutate(flow_diff = NEW RIVER AT RADFORD, VA - NEW RIVER AT IVANHOE, VA)",
   opts:["R correctly interprets the column name because spaces are allowed in column names",
         "R throws an error because column names with spaces must be wrapped in backticks to be referenced in code",
         "R replaces the spaces with underscores automatically",
         "mutate() ignores the spaces and uses only the first word of each name"],
   ans:1,
   exp:"Column names containing spaces or special characters cannot be referenced in R code without wrapping them in backticks (`). The correct syntax is `NEW RIVER AT RADFORD, VA` - `NEW RIVER AT IVANHOE, VA`. Without backticks, R cannot parse the expression."},

  {type:"Troubleshooting",
   q:"Which of the following pivot_longer() calls does NOT have a syntax error?",
   code:null,
   opts:["pivot_longer(cols = c(Spec_Cond, Chloride))",
         "pivot_longer(Spec_Cond, Chloride)",
         "pivot_longer(col = Spec_Cond:Chloride)",
         "pivot_longer(cols = Spec_Cond - Chloride)"],
   ans:0,
   exp:"Option A is correct — cols accepts a column selection using c(), a colon range, or tidyselect helpers. Option B is missing the cols argument name. Option C uses the wrong argument name 'col' (missing the 's'). Option D uses a minus sign, which is not valid for column selection in pivot_longer()."},

  {type:"Concept",
   q:"The lesson uses facet_wrap(facets = ~parameter_nm, scales = \"free_y\", ncol = 1) on the long-format SWVA data. Why does this approach work so cleanly on long data?",
   code:null,
   opts:["facet_wrap() only works on long-format data and will error on wide data",
         "Because in long format, parameter_nm is a single column containing labels like 'Discharge' and 'Temperature', making it trivial to split the plot into separate panels by variable",
         "Long data automatically sorts the facet panels alphabetically",
         "ncol = 1 requires long format to display correctly"],
   ans:1,
   exp:"In long format, all measurements share a single 'value' column, and a separate column (parameter_nm) identifies what each measurement represents. This makes facet_wrap() on that identifier column trivially easy — one facet per variable type, all driven by a single column mapping."}

];

let cur = 0, ans = {}, submitted = false;

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function typeCls(t){ return t==="Troubleshooting"?"type-ts":t==="Problem Solving"?"type-ps":"type-co"; }

function render(){
  const q = Q[cur];
  const sel = ans[cur];
  const codeHTML = q.code ? `<code class="code-block">${esc(q.code)}</code>` : '';
  const optsHTML = q.opts.map((o,i)=>{
    let cls='option', chk='';
    if(submitted){
      cls+=' disabled submitted';
      if(i===q.ans){cls+=' correct';chk='<span class="opt-check">&#10003;</span>';}
      else if(sel===i){cls+=' wrong';chk='<span class="opt-check">&#10007;</span>';}
    } else {
      if(sel===i) cls+=' selected';
    }
    return `<button class="${cls}" onclick="pick(${i})"><span class="opt-letter">${'ABCD'[i]}</span><span>${esc(o)}</span>${chk}</button>`;
  }).join('');
  const expHTML = submitted ? `<div class="explanation"><strong>Explanation:</strong> ${esc(q.exp)}</div>` : '';

  document.getElementById('question-card').innerHTML =
    `<span class="type-badge ${typeCls(q.type)}">${q.type}</span>
     <div class="question-text">${esc(q.q)}</div>
     ${codeHTML}
     <div class="options">${optsHTML}</div>
     ${expHTML}`;

  const pct = ((cur+1)/Q.length*100).toFixed(0);
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `Question ${cur+1} of ${Q.length}`;
  document.getElementById('btn-prev').disabled = cur===0;
  document.getElementById('btn-next').disabled = cur===Q.length-1;
  const count = Object.keys(ans).length;
  const sub = document.getElementById('btn-submit');
  sub.textContent = `Submit Quiz (${count}/${Q.length} answered)`;
  sub.disabled = count < Q.length;
  renderDots();
}

function pick(i){ if(submitted) return; ans[cur]=i; render(); }
function navigate(d){ cur=Math.max(0,Math.min(Q.length-1,cur+d)); render(); }
function goTo(i){ cur=i; render(); }

function renderDots(){
  document.getElementById('dots').innerHTML = Q.map((_,i)=>{
    let cls='dot';
    if(i===cur) cls+=' active';
    else if(submitted && ans[i]===Q[i].ans) cls+=' correct-dot';
    else if(submitted && ans[i]!==undefined) cls+=' wrong-dot';
    else if(ans[i]!==undefined) cls+=' answered';
    return `<div class="${cls}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');
}

function submitQuiz(){
  submitted=true;
  const score = Q.reduce((a,q,i)=>a+(ans[i]===q.ans?1:0),0);
  document.getElementById('btn-submit').style.display='none';
  document.getElementById('btn-reset').style.display='';
  const badge = document.getElementById('score-badge');
  badge.textContent=`Score: ${score}/${Q.length} (${Math.round(score/Q.length*100)}%)`;
  badge.style.display='';
  const emoji = score>=22?'&#127881;':score>=17?'&#128077;':'&#128218;';
  const msg = score>=22?'Excellent! You have a strong grasp of joins, pivots, and dataRetrieval.':score>=17?'Good job! Review the explanations for the questions you missed.':'Keep at it — revisit the chapter and try again after reviewing the material.';
  const res = document.getElementById('results');
  res.style.display='block';
  res.innerHTML=`<div class="results-emoji">${emoji}</div><div class="results-score">${score} / ${Q.length}</div><div class="results-label">${Math.round(score/Q.length*100)}% correct</div><div class="results-msg">${msg}</div>`;
  render();
}

function resetQuiz(){
  ans={}; submitted=false; cur=0;
  document.getElementById('btn-submit').style.display='';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('score-badge').style.display='none';
  document.getElementById('results').style.display='none';
  render();
}

render();
</script>
